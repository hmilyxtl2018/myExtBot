# CI workflow for myExtBot
#
# NOTE: Configure branch protection rules in GitHub Settings → Branches
# to require this workflow ("CI") to pass before merging into main.
#
# Go to: Settings → Branches → Add branch protection rule → main
# Enable: "Require status checks to pass before merging"
# Search for and select: "lint", "type-check", "test", "build"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check, Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  build-tauri:
    name: Tauri Desktop Build (Windows)
    runs-on: windows-latest
    needs: ci
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Upload Tauri build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-build
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
